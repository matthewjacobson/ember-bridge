# Builds installers for macOS (universal), Windows, and Linux, and attaches
# them to a draft GitHub Release.
#
# Trigger: push a tag like `v0.1.0` (or run manually from the Actions tab).
# The release is created as a DRAFT — review it, then publish.
#
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # needed to create the release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          # One DMG that runs on both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: --target universal-apple-darwin
          # .msi and NSIS .exe installers.
          - platform: windows-latest
            args: ""
          # .deb, .rpm, and AppImage.
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri v2 / webkit2gtk-4.1)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS builds a universal binary, so it needs both targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS signing + notarization (optional) --------------------
          # Without these, macOS builds are ad-hoc signed and users must
          # approve the app in System Settings > Privacy & Security.
          # To enable: add the secrets in repo Settings > Secrets and
          # variables > Actions, then uncomment.
          #
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # __VERSION__ is replaced with the version from tauri.conf.json.
          tagName: v__VERSION__
          releaseName: "Ember Bridge v__VERSION__"
          releaseBody: "See the assets below for your platform's installer."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
